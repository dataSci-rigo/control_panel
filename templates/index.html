<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>a-bot control panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, sans-serif;
         min-height: 100vh; padding: 1rem; }
  h1  { color: #38bdf8; font-size: 1.25rem; margin-bottom: 1rem; letter-spacing: .05em; }
  .grid { display: flex; flex-direction: column; gap: .75rem; }
  .card { background: #1e293b; border-radius: 10px; padding: 1rem;
          border: 1px solid #334155; }
  .card-header { display: flex; justify-content: space-between; align-items: center;
                 margin-bottom: .6rem; }
  .label { font-weight: 600; font-size: 1rem; }
  .badge { font-size: .7rem; font-weight: 700; padding: .2rem .55rem;
           border-radius: 99px; text-transform: uppercase; letter-spacing: .05em; }
  .badge-active   { background: #166534; color: #4ade80; }
  .badge-inactive { background: #3f3f46; color: #a1a1aa; }
  .badge-failed   { background: #7f1d1d; color: #f87171; }
  .badge-other    { background: #1c3050; color: #7dd3fc; }
  .btns { display: flex; gap: .5rem; }
  button { border: none; border-radius: 6px; padding: .45rem .9rem;
           font-size: .85rem; font-weight: 600; cursor: pointer;
           transition: opacity .15s; }
  button:active { opacity: .7; }
  .btn-start   { background: #166534; color: #4ade80; }
  .btn-stop    { background: #7f1d1d; color: #f87171; }
  .btn-restart { background: #1e3a5f; color: #7dd3fc; }
  .btn-logs    { background: #2d2d3a; color: #a78bfa; }
  .btn-open    { background: #1a3040; color: #38bdf8; }
  .logs-box { display: none; margin-top: .75rem; background: #0f172a;
              border-radius: 6px; padding: .75rem; max-height: 260px;
              overflow-y: auto; }
  .logs-box pre { font-size: .72rem; line-height: 1.5; white-space: pre-wrap;
                  word-break: break-all; color: #94a3b8; }
  .monitor-section { margin-top: 1.5rem; }
  .monitor-section h2 { font-size: .9rem; color: #7dd3fc; margin-bottom: .5rem; }
  #monitor-content { background: #0f172a; border-radius: 6px; padding: .75rem;
                     max-height: 200px; overflow-y: auto; }
  #monitor-content pre { font-size: .7rem; color: #94a3b8; white-space: pre-wrap; }
  .refresh-bar { display: flex; align-items: center; gap: .75rem;
                 margin-bottom: 1rem; font-size: .8rem; color: #64748b; }
  .refresh-bar button { padding: .3rem .7rem; font-size: .78rem;
                        background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
</style>
</head>
<body>

<h1>a-bot control panel</h1>

<div class="refresh-bar">
  <span id="last-refresh">—</span>
  <button onclick="refreshAll()">↻ Refresh</button>
</div>

<div class="grid" id="services">
  {% for svc in services %}
  <div class="card" id="card-{{ svc.id }}">
    <div class="card-header">
      <span class="label">{{ svc.label }}</span>
      <span class="badge {{ 'badge-active' if svc.status == 'active' else 'badge-failed' if svc.status == 'failed' else 'badge-inactive' }}"
            id="badge-{{ svc.id }}">{{ svc.status }}</span>
    </div>
    <div class="btns">
      <button class="btn-start"   onclick="action('{{ svc.id }}','start')">Start</button>
      <button class="btn-stop"    onclick="action('{{ svc.id }}','stop')">Stop</button>
      <button class="btn-restart" onclick="action('{{ svc.id }}','restart')">Restart</button>
      <button class="btn-logs"    onclick="toggleLogs('{{ svc.id }}')">Logs</button>
      {% if svc.path %}
      <button class="btn-open"    onclick="window.open('{{ svc.path }}','_blank')">Open</button>
      {% endif %}
    </div>
    <div class="logs-box" id="logs-{{ svc.id }}">
      <pre id="logtext-{{ svc.id }}">Loading...</pre>
    </div>
  </div>
  {% endfor %}
</div>

<div class="monitor-section">
  <h2>Usage monitor <button onclick="loadMonitor()" style="margin-left:.5rem;padding:.2rem .6rem;font-size:.72rem;background:#1e293b;color:#7dd3fc;border:1px solid #334155;border-radius:5px;">↻</button></h2>
  <div id="monitor-content"><pre>Click ↻ to load.</pre></div>
</div>

<script>
function badgeClass(status) {
  if (status === 'active')   return 'badge-active';
  if (status === 'failed')   return 'badge-failed';
  if (status === 'inactive') return 'badge-inactive';
  return 'badge-other';
}

async function action(id, act) {
  const badge = document.getElementById('badge-' + id);
  badge.textContent = '...';
  badge.className = 'badge badge-other';
  try {
    const r = await fetch('/api/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({service: id, action: act})
    });
    const d = await r.json();
    badge.textContent = d.status;
    badge.className = 'badge ' + badgeClass(d.status);
  } catch(e) {
    badge.textContent = 'error';
    badge.className = 'badge badge-failed';
  }
}

async function toggleLogs(id) {
  const box = document.getElementById('logs-' + id);
  if (box.style.display === 'block') {
    box.style.display = 'none';
    return;
  }
  box.style.display = 'block';
  const pre = document.getElementById('logtext-' + id);
  pre.textContent = 'Loading...';
  try {
    const r = await fetch('/api/logs/' + id + '?lines=60');
    const d = await r.json();
    pre.textContent = d.logs || '(no logs)';
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    pre.textContent = 'Error fetching logs.';
  }
}

async function refreshAll() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    for (const [id, status] of Object.entries(d)) {
      const badge = document.getElementById('badge-' + id);
      if (badge) {
        badge.textContent = status;
        badge.className = 'badge ' + badgeClass(status);
      }
    }
    document.getElementById('last-refresh').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {}
}

async function loadMonitor() {
  const el = document.getElementById('monitor-content');
  el.innerHTML = '<pre>Loading...</pre>';
  try {
    const r = await fetch('/api/monitor');
    const d = await r.json();
    el.innerHTML = '<pre>' + (d.log || '(empty)') + '</pre>';
  } catch(e) {
    el.innerHTML = '<pre>Error loading monitor log.</pre>';
  }
}

// Auto-refresh status every 30 seconds
setInterval(refreshAll, 30000);
refreshAll();
</script>
</body>
</html>
